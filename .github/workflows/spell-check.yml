name: Spell Check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  spell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1
        with:
          files: |
            README.md
            CHANGELOG.md
            SECURITY.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            docs
            .github
            article
            prototype
            examples

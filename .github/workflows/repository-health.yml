name: Repository Health

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository layout
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f CITATION.cff
          test -f GOVERNANCE.md
          test -f PROJECT_ROADMAP.md
          test -d .github/ISSUE_TEMPLATE
          test -d .github/workflows
          test -d docs/adr
          test -d docs/rfcs
